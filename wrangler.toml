# AnimePulse Cloudflare Worker Configuration
name = "animepulse"
main = "worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# KV Namespace - Storage للأخبار والبيانات
[[kv_namespaces]]
binding = "ANIMEPULSE_KV"
id = "05eaa7b73ed34611b6c673a961220461"
preview_id = "05eaa7b73ed34611b6c673a961220461"

# Cron Triggers - التشغيل التلقائي كل 6 ساعات
[triggers]
crons = ["0 */6 * * *"]

# متغيرات البيئة للـ Production
[env.production.vars]
# ⚠️ غيّر هذا لسر قوي! استخدم: openssl rand -base64 32
CRON_SECRET = "CHANGE_ME_TO_RANDOM_SECRET_32_CHARS"
GEMINI_API_KEY = "AIzaSyB0zLp7XtZt1YXbkcMPbqDA4hLzD17sL8s"
TELEGRAM_BOT_TOKEN = "8619875811:AAEOOLGCadWLdXcOjts7wIcBRVsV7lZJrV8"
TELEGRAM_CHANNEL_ID = "-1003730635887"

# إعدادات الـ Worker
[placement]
mode = "smart"
